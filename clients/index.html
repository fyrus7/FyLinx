<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyLinx Gallery</title>

  <link rel="stylesheet" href="/clients/style.css">

</head>
<body>
<header>
  <h1>FyLinx</h1>

  <div style="display:flex; gap:8px; align-items:center;">
<!--    <span style="font-size:12px; color:#fff;">Live Gallery</span> -->
  <span id="galleryTitle" style="font-size:12px; color:#fff;">Load Gallery</span>
    <button id="selectBtn">⧉</button>
  </div>
</header>

<div id="imageGrid"></div>
  
<footer>
  &copy; <span id="year"></span> FyLinx.
</footer>

<div id="multiBar">
  <span id="multiCount">0 </span>
  <div style="display:flex; gap:10px;">
    <button id="multiDownload" class="btn-dark">Download</button>
    <button id="multiCancel" class="btn-dark">X</button>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">

  <div class="modal-info">
    <button id="downloadBtn" class="btn-dark">Download</button>
    <div>Swipe left / right</div>
    <div>Tap outside to close</div>
  </div>
</div>

<script>
    // Get the current year from the device and update the copyright span
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script>
const PAGE_SIZE = 12;
</script>

  <script src="/clients/script.js"></script>

</body>
</html>
