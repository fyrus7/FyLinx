<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyLinx</title>

  <meta property="og:description" content="Photographer Gallery">
  <meta property="og:url" content="https://fylinx.pages.dev/photog">
  <meta property="og:image" content="https://fylinx.pages.dev/clients/photog/fylinxb.jpg">
  <meta property="og:type" content="website">

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:300px;
  background:#1a1a1a;
  padding:24px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h2{
  margin-top:0;
  font-weight:600;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  outline:none;
  background:#2a2a2a;
  color:#fff;
  font-size:14px;
  box-sizing:border-box;
}

input::placeholder{
  color:#aaa;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  background:#fff;
  color:#111;
  font-weight:600;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.message{
  margin-top:14px;
  font-size:13px;
  text-align:center;
}

.success{
  color:#4caf50;
}

.error{
  color:#ff5252;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gallery Creation</h2>

  <form id="galleryForm">
    <input type="text" id="slug" placeholder="Unique Path (eg: johnjane)" required>
    <div id="previewUrl" style="font-size:12px; margin-top:6px; color:#aaa;"></div>
    <input type="text" id="folder" placeholder="Google Drive Public URL" required>
    <input type="text" id="title" placeholder="Display Title (eg: wedding of John & Jane)">
    <input type="text" id="token" placeholder="Token" required>

    <button type="submit" id="submitBtn">
      Submit Gallery
    </button>
  </form>

  <div id="message" class="message"></div>
</div>

<script>

const FYLINX_GALLERY = "https://script.google.com/macros/s/AKfycbyqYA9a3jYGkb03QQ0-IyCaqZQbKlumQjvJYCBlsrLepN-XlZ0AszNF1oLhAU_j093-zQ/exec"; // ← tukar ini

const form = document.getElementById("galleryForm");
const messageBox = document.getElementById("message");
const submitBtn = document.getElementById("submitBtn");

function extractFolderId(input){

  input = input.trim();

  const match = input.match(/\/folders\/([a-zA-Z0-9_-]+)/);

  if(match){
    return match[1];
  }

  return input; // kalau user masukkan ID sahaja
}

const slugInput = document.getElementById("slug");
const previewBox = document.getElementById("previewUrl");

slugInput.addEventListener("input", function(){
  const value = slugInput.value.trim().toLowerCase();
  if(value){
    previewBox.textContent =
      "URL: https://fylinx.pages.dev/clients/?gallery=" + value;
  }else{
    previewBox.textContent = "";
  }
});

form.addEventListener("submit", async function(e){

  e.preventDefault();

  messageBox.textContent = "";
  messageBox.className = "message";

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  const rawFolderInput = document.getElementById("folder").value.trim();
  const folderId = extractFolderId(rawFolderInput);

  if(!/^[a-zA-Z0-9_-]{20,}$/.test(folderId)){
    messageBox.textContent = "Invalid Google Drive Folder Link";
    messageBox.classList.add("error");
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Gallery";
    return;
  }
  
  const payload = {
    slug: document.getElementById("slug").value.trim().toLowerCase(),
    folder: folderId,
    title: document.getElementById("title").value.trim(),
    token: document.getElementById("token").value.trim()
  };

  try{

    const res = await fetch(FYLINX_GALLERY, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const result = await res.json();

    if(result.success){
      
      const finalSlug = payload.slug;
      const finalUrl =
        "https://fylinx.pages.dev/clients/?gallery=" + finalSlug;
      
      messageBox.innerHTML =
        "Gallery Created Successfully<br><br>" +
        "<input id='generatedUrl' type='text' value='" + finalUrl + "' readonly " +
        "style='width:100%;padding:8px;border-radius:6px;border:none;background:#2a2a2a;color:#fff;margin-bottom:8px;'>" +
        "<button id='copyBtn' style='width:100%;padding:8px;border-radius:6px;border:none;background:#fff;color:#111;font-weight:600;cursor:pointer;'>Copy URL</button>";
      
      messageBox.classList.add("success");
      
      form.reset();
      previewBox.textContent = "";
      
      setTimeout(()=>{
        const urlInput = document.getElementById("generatedUrl");
        const copyBtn = document.getElementById("copyBtn");
        
        async function copyUrl(){
          try{
            await navigator.clipboard.writeText(finalUrl);
            copyBtn.textContent = "Copied ✓";
            setTimeout(()=>{
              copyBtn.textContent = "Copy URL";
            },1500);
          }catch{
            urlInput.select();
            document.execCommand("copy");
            copyBtn.textContent = "Copied ✓";
            setTimeout(()=>{
              copyBtn.textContent = "Copy URL";
            },1500);
          }
        }
        
        copyBtn.addEventListener("click", copyUrl);
        
        // 🔥 Auto copy terus bila berjaya
        copyUrl();
      
      }, 50);
    }else{
      messageBox.textContent = result.message;
      messageBox.classList.add("error");
    }

  }catch(err){
    messageBox.textContent = "Network error";
    messageBox.classList.add("error");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Submit Gallery";
});

</script>

</body>
</html>
