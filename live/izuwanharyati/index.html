<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyLinx Gallery</title>
<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#111;
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}

header h1{
  font-size:14px;
  margin:0;
  letter-spacing:1px;
}

button{
  background:#fff;
  color:#000;
  border:0;
  padding:6px 14px;
  font-size:12px;
  cursor:pointer;
  border-radius: 5px;
}
.btn-dark{
  background:transparent;
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
  padding:6px 16px;
  border-radius:20px;
  transition:background .2s ease, opacity .2s ease;
}

.btn-dark:hover{
  background:rgba(255,255,255,.1);
}

.btn-dark:disabled{
  opacity:.5;
}

#imageGrid{
  display:flex;
  flex-direction:column;
  gap:6px;
  max-width:95%;
  margin:0 auto;
}

.row{
  display:flex;
  gap:6px;
  width:100%;
}

.row img{
  object-fit:cover;
  cursor:pointer;
}

footer{
  text-align:center;
  font-size:11px;
  padding:12px;
  opacity:.5;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.modal img{
  max-width:95%;
  max-height:85%;
  margin:auto;
}

#modalImg{
  transition: transform 0.35s ease, opacity 0.35s ease;
}

.modal-info{
  text-align:center;
  padding:16px 20px 22px;
  font-size:13px;
  opacity:0.8;
  line-height:1.6;
}

.slide-out-left{
  transform: translateX(-100%);
  opacity: 0;
}

.slide-out-right{
  transform: translateX(100%);
  opacity: 0;
}

.slide-in-left{
  transform: translateX(100%);
  opacity: 0;
}

.slide-in-right{
  transform: translateX(-100%);
  opacity: 0;
}

body.modal-open{
  overflow: hidden;
  height: 100vh;
}
button:disabled{
  opacity:0.6;
  cursor:default;
}

img.selected{
  outline:3px solid #00aaff;
  opacity:.6;
}

#multiBar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  padding:10px 18px;
  border-radius:30px;
  display:flex;
  align-items:center;
  gap:20px;
  box-shadow:0 5px 20px rgba(0,0,0,.5);
  z-index:200;
  display:none;
}
#selectBtn{
  background:none;
  border:none;
  color:#fff;
  padding:0;
  font-size:14px;
  cursor:pointer;
}
</style>
</head>
<body>
<header>
  <h1>FyLinx</h1>

  <div style="display:flex; gap:8px; align-items:center;">
    <span style="font-size:12px; color:#fff;">Izuwan & Haryati</span>
    <button id="selectBtn">⧉</button>
  </div>
</header>

<div id="imageGrid"></div>

<footer>
  &copy; <span id="year"></span> FyLinx.
</footer>

<div id="multiBar">
  <span id="multiCount">0 </span>
  <div style="display:flex; gap:10px;">
    <button id="multiDownload" class="btn-dark">Download</button>
    <button id="multiCancel" class="btn-dark">X</button>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">

  <div class="modal-info">
    <button id="downloadBtn" class="btn-dark">Download</button>
    <div>Swipe left / right</div>
    <div>Tap outside to close</div>
  </div>
</div>

<script>
    // Get the current year from the device and update the copyright span
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script>
const FOLDER_ID = "10Z_JMbTgUPU0IHJGNjCqpDVusblNU5Ta";
const PAGE_SIZE = 10;
</script>

  <script src="/live/script.js"></script>

</body>
</html>
