<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyLinx Gallery</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#111;
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}

header h1{
  font-size:14px;
  margin:0;
  letter-spacing:1px;
}

button{
  background:#fff;
  color:#000;
  border:0;
  padding:6px 14px;
  font-size:12px;
  cursor:pointer;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  padding:8px;
}

@media(min-width:768px){
  .gallery{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(min-width:1200px){
  .gallery{
    grid-template-columns:repeat(5,1fr);
  }
}

@media(min-width:1600px){
  .gallery{
    grid-template-columns:repeat(6,1fr);
  }
}

.gallery img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

footer{
  text-align:center;
  font-size:11px;
  padding:12px;
  opacity:.5;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  flex-direction:column;
  justify-content:space-between;
  z-index:100;
}

.modal-bar{
  background:rgba(0,0,0,.6);
  text-align:center;
  padding:14px;
  font-size:13px;
  cursor:pointer;
}

.modal img{
  max-width:95%;
  max-height:80%;
  margin:auto;
}
</style>
</head>

<body>

<header>
  <h1>FyLinx</h1>
  <span style="font-size:12px; color:#fff; margin-left: auto;">Ijoy & Kila</span>
</header>

<div class="gallery" id="gallery"></div>

<footer>© FyLinx</footer>

<div class="modal" id="modal">
  <div class="modal-bar" id="modalCloseBar">
    Click here to close
  </div>

  <img id="modalImg">

  <div class="modal-bar" id="modalDownloadBar">
    Download
  </div>
</div>

<script>
const API_KEY   = "AIzaSyCyL4jxLN9w87WG20GqeEIAaUCupjKmn8U";
const FOLDER_ID = "1qEfxwXgPcvEPRlBKNNecsHaqFSRrAjTE";
const PAGE_SIZE = 20;

let nextPageToken = null;
const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

let modalImageIds = [];
let currentIndex = 0;

const modalCloseBar = document.getElementById("modalCloseBar");
const modalDownloadBar = document.getElementById("modalDownloadBar");

let currentImageId = null;
  
// ------------------- MORE button -------------------
const moreBtn = document.createElement("button");
moreBtn.textContent = "MORE";
moreBtn.style.display = "block";
moreBtn.style.margin = "16px auto";
moreBtn.style.padding = "8px 16px";
moreBtn.style.fontSize = "12px";
gallery.after(moreBtn);

// ------------------- util: extract number from filename -------------------
function extractNumber(name){
  // ambil nombor terakhir dalam nama (IMG_2024_2001.jpg → 2001)
  const matches = name.match(/\d+/g);
  return matches ? parseInt(matches[matches.length - 1], 10) : 0;
}

// ------------------- Load images -------------------
async function loadNextImages(){
  const query = encodeURIComponent(
    `'${FOLDER_ID}' in parents and mimeType contains 'image/'`
  );

  let url =
    `https://www.googleapis.com/drive/v3/files?` +
    `q=${query}` +
    `&orderBy=name desc` + // paging stabil
    `&pageSize=${PAGE_SIZE}` +
    `&fields=nextPageToken,files(id,name)` +
    `&key=${API_KEY}`;

  if (nextPageToken) url += `&pageToken=${nextPageToken}`;

  const res = await fetch(url);
  const data = await res.json();

  nextPageToken = data.nextPageToken || null;

  // 🔥 NATURAL SORT ikut nombor dalam nama (Z–A)
  data.files
    .sort((a, b) => extractNumber(b.name) - extractNumber(a.name))
    .forEach(file => addImage(file));
}

// ------------------- Add image -------------------
function addImage(file){

  if(document.getElementById(`img-${file.id}`)) return;

  const img = document.createElement("img");
  img.id = `img-${file.id}`;
  img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;

  const index = gallery.children.length;
  const pattern = index % 6;

  /*
    Pattern 6 repeat:
    0 → big (2x2)
    1 → normal
    2 → normal
    3 → wide (2x1)
    4 → normal
    5 → normal
  */

  if(pattern === 0){
    img.style.gridColumn = "span 2";
    img.style.gridRow = "span 2";
  }
  else if(pattern === 3){
    img.style.gridColumn = "span 2";
  }

  img.onclick = ()=>openModal(file.id);

  gallery.appendChild(img);
}

// ------------------- Modal -------------------
function openModal(fileId){
  currentImageId = fileId;
  currentIndex = modalImageIds.indexOf(fileId);
  modalImg.src = `https://lh3.googleusercontent.com/d/${fileId}`;
  modal.style.display = "flex";
}

modalCloseBar.onclick = ()=>{
  modal.style.display = "none";
};

modalDownloadBar.onclick = ()=>{
  if(!currentImageId) return;

  window.open(
    `https://drive.google.com/uc?export=download&id=${currentImageId}`,
    "_blank"
  );
};

modal.onclick = e=>{
  if(e.target === modal) modal.style.display = "none";
};

document.addEventListener("keydown", e=>{
  if(modal.style.display !== "flex") return;

  if(e.key === "ArrowRight"){
    currentIndex = (currentIndex + 1) % modalImageIds.length;
  }
  if(e.key === "ArrowLeft"){
    currentIndex = (currentIndex - 1 + modalImageIds.length) % modalImageIds.length;
  }
  if(e.key === "Escape"){
    modal.style.display = "none";
    return;
  }

  modalImg.src = `https://lh3.googleusercontent.com/d/${modalImageIds[currentIndex]}`;
});

// ------------------- Init -------------------
moreBtn.onclick = loadNextImages;
loadNextImages();
</script>


</body>
</html>
