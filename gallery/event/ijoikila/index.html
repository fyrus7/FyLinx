<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyLinx Gallery</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#111;
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}

header h1{
  font-size:14px;
  margin:0;
  letter-spacing:1px;
}

button{
  background:#fff;
  color:#000;
  border:0;
  padding:6px 14px;
  font-size:12px;
  cursor:pointer;
  border-radius: 5px;
}

#imageGrid{
  display:flex;
  flex-direction:column;
  gap:6px;
  max-width:95%;
  margin:0 auto;
}

.row{
  display:flex;
  gap:6px;
  width:100%;
}

.row img{
  object-fit:cover;
  cursor:pointer;
}

footer{
  text-align:center;
  font-size:11px;
  padding:12px;
  opacity:.5;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.modal img{
  max-width:95%;
  max-height:85%;
  margin:auto;
}

#modalImg{
  transition: transform 0.35s ease, opacity 0.35s ease;
}

.modal-info{
  text-align:center;
  padding:16px 20px 22px;
  font-size:13px;
  opacity:0.8;
  line-height:1.6;
}

.slide-out-left{
  transform: translateX(-100%);
  opacity: 0;
}

.slide-out-right{
  transform: translateX(100%);
  opacity: 0;
}

.slide-in-left{
  transform: translateX(100%);
  opacity: 0;
}

.slide-in-right{
  transform: translateX(-100%);
  opacity: 0;
}

body.modal-open{
  overflow: hidden;
  height: 100vh;
}
button:disabled{
  opacity:0.6;
  cursor:default;
}

img.selected{
  outline:3px solid #00aaff;
  opacity:.6;
}

#multiBar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  padding:10px 18px;
  border-radius:30px;
  display:flex;
  align-items:center;
  gap:20px;
  box-shadow:0 5px 20px rgba(0,0,0,.5);
  z-index:200;
  display:none;
}

#multiBar button{
  background:#00aaff;
  color:#fff;
}
</style>
</head>

<body>

<header>
  <h1>FyLinx</h1>

  <div style="display:flex; gap:8px; align-items:center;">
    <button id="selectBtn">Select</button>
    <span style="font-size:12px; color:#fff;">Ijoy & Kila</span>
  </div>
</header>

<div id="imageGrid"></div>

<footer>
  &copy; <span id="year"></span> FyLinx.
</footer>

<div id="multiBar">
  <span id="multiCount">0 </span>
  <div style="display:flex; gap:10px;">
    <button id="multiDownload">Download</button>
    <button id="multiCancel">X</button>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">

  <div class="modal-info">
    <button id="downloadBtn" style="margin-bottom:10px;">Download</button>
    <div>Swipe left / right</div>
    <div>Tap outside to close</div>
  </div>
</div>

<script>
    // Get the current year from the device and update the copyright span
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script>
const API_KEY   = "AIzaSyCyL4jxLN9w87WG20GqeEIAaUCupjKmn8U";
const FOLDER_ID = "1qEfxwXgPcvEPRlBKNNecsHaqFSRrAjTE";
const PAGE_SIZE = 10;

let nextPageToken = null;
let isLoading = false;
const gallery = document.getElementById("imageGrid");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const selectBtn = document.getElementById("selectBtn");
let selectMode = false;
let selectedIds = new Set();
const downloadBtn = document.getElementById("downloadBtn");
const multiBar = document.getElementById("multiBar");
const multiDownload = document.getElementById("multiDownload");
const multiCancel = document.getElementById("multiCancel");
const multiCount = document.getElementById("multiCount");

let modalImageIds = [];
let currentIndex = 0;
const loadedImageSet = new Set();

// ------------------- Download ---------------------
async function downloadCurrentImage(){

  const fileId = modalImageIds[currentIndex];
  const fileName = loadedImages[currentIndex]?.name || "photo.jpg";

  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;

  try{

    // UI state: downloading
    downloadBtn.disabled = true;
    downloadBtn.textContent = "Downloading...";

    const response = await fetch(url);
    if(!response.ok) throw new Error("Network error");

    const blob = await response.blob();
    const blobUrl = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    window.URL.revokeObjectURL(blobUrl);

    // UI state: done
    downloadBtn.textContent = "Downloaded ✓";

    setTimeout(()=>{
      downloadBtn.textContent = "Download";
      downloadBtn.disabled = false;
    },1500);

  }catch(err){
    console.error("Download failed:", err);

    downloadBtn.textContent = "Failed";
    setTimeout(()=>{
      downloadBtn.textContent = "Download";
      downloadBtn.disabled = false;
    },1500);
  }
}

downloadBtn.addEventListener("click", e=>{
  e.stopPropagation(); // elak modal tertutup
  downloadCurrentImage();
});
// ------------------- MORE button -------------------
const moreBtn = document.createElement("button");
moreBtn.textContent = "MORE";
moreBtn.style.display = "block";
moreBtn.style.margin = "16px auto";
moreBtn.style.padding = "8px 16px";
moreBtn.style.fontSize = "12px";
gallery.after(moreBtn);

// ------------------- util: extract number from filename -------------------
function extractNumber(name){
  // ambil nombor terakhir dalam nama (IMG_2024_2001.jpg → 2001)
  const matches = name.match(/\d+/g);
  return matches ? parseInt(matches[matches.length - 1], 10) : 0;
}

// ------------------- Load images -------------------
async function loadNextImages(){

  if(isLoading) return; // elak double click
  isLoading = true;

  moreBtn.disabled = true;
  moreBtn.textContent = "Loading...";

  const query = encodeURIComponent(
    `'${FOLDER_ID}' in parents and mimeType contains 'image/'`
  );

  let url =
    `https://www.googleapis.com/drive/v3/files?` +
    `q=${query}` +
    `&orderBy=name desc` +
    `&pageSize=${PAGE_SIZE}` +
    `&fields=nextPageToken,files(id,name)` +
    `&key=${API_KEY}`;

  if (nextPageToken) url += `&pageToken=${nextPageToken}`;

  const res = await fetch(url);
  const data = await res.json();

  nextPageToken = data.nextPageToken || null;

  const sorted = data.files
    .sort((a, b) => extractNumber(b.name) - extractNumber(a.name));

  addImages(sorted);

  // reset button
  isLoading = false;
  moreBtn.disabled = false;
  moreBtn.textContent = "MORE";

  if(!nextPageToken){
    moreBtn.style.display = "none";
  }
}

// ------------------- Add image -------------------
let loadedImages = [];

function addImages(files){

  const preload = files.map(file => new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      resolve({
        id: file.id,
        name: file.name,
        thumb: `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`,
        full: `https://lh3.googleusercontent.com/d/${file.id}`,
        ratio: img.naturalWidth / img.naturalHeight
      });
    };
    img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;
  }));

  Promise.all(preload).then(images=>{

  // filter gambar yang belum pernah load
  const newImages = images.filter(img => {
    if(loadedImageSet.has(img.id)) return false;
    loadedImageSet.add(img.id);
    return true;
  });

  if(newImages.length === 0) return;

  newImages.forEach(img => modalImageIds.push(img.id));
  loadedImages = loadedImages.concat(newImages);
  renderJustified(newImages);
});
}


function renderJustified(images){

  const container = document.getElementById("imageGrid");
  const TARGET_ROW_HEIGHT = 220;
  const containerWidth = container.clientWidth;

  let row = [];
  let rowWidth = 0;

  function addRow(row, rowWidth){
    const rowDiv = document.createElement("div");
    rowDiv.className = "row";

    const scale = containerWidth / rowWidth;

    row.forEach(item=>{
      const img = document.createElement("img");
      img.src = item.thumb;
      img.style.height = `${TARGET_ROW_HEIGHT * scale}px`;
      img.style.width = `${TARGET_ROW_HEIGHT * scale * item.ratio}px`;

      img.onclick = ()=>{

        if(!selectMode){
          openModal(item.id);
          return;
        }
        
        if(selectedIds.has(item.id)){
          selectedIds.delete(item.id);
          img.classList.remove("selected");
        }else{
          selectedIds.add(item.id);
          img.classList.add("selected");
        }
        
        multiCount.textContent = `${selectedIds.size} selected`;
      };

      rowDiv.appendChild(img);
    });

    container.appendChild(rowDiv);
  }

  images.forEach(img=>{
    const scaledWidth = img.ratio * TARGET_ROW_HEIGHT;
    row.push(img);
    rowWidth += scaledWidth;

    if(rowWidth >= containerWidth){
      addRow(row, rowWidth);
      row = [];
      rowWidth = 0;
    }
  });

  if(row.length){
    addRow(row, rowWidth);
  }
}

// ------------------- Modal -------------------
function openModal(fileId){
  currentIndex = modalImageIds.indexOf(fileId);
  showModalImage(currentIndex);
  modal.style.display = "flex";

  document.body.classList.add("modal-open");
}

function showModalImage(newIndex){

  const total = modalImageIds.length;

  if(newIndex < 0) newIndex = total - 1;
  if(newIndex >= total) newIndex = 0;

  const diff = newIndex - currentIndex;

  let direction;

  if(diff === 1 || diff === -(total - 1)){
    direction = "right";
  } else {
    direction = "left";
  }

  modalImg.classList.add(
    direction === "right" ? "slide-out-left" : "slide-out-right"
  );

  setTimeout(()=>{

    currentIndex = newIndex;
    modalImg.src = `https://lh3.googleusercontent.com/d/${modalImageIds[newIndex]}`;

    modalImg.classList.remove("slide-out-left","slide-out-right");

    modalImg.classList.add(
      direction === "right" ? "slide-in-right" : "slide-in-left"
    );

    requestAnimationFrame(()=>{
      modalImg.classList.remove("slide-in-left","slide-in-right");
    });

  }, 300);
}

modal.addEventListener("click", e=>{
  if(e.target !== modalImg){
    modal.style.display = "none";
    document.body.classList.remove("modal-open");
  }
});

document.addEventListener("keydown", e=>{
  if(modal.style.display !== "flex") return;

  if(e.key === "ArrowRight"){
    showModalImage((currentIndex + 1) % modalImageIds.length);
  }

  if(e.key === "ArrowLeft"){
    showModalImage(
      (currentIndex - 1 + modalImageIds.length) % modalImageIds.length
    );
  }

  if(e.key === "Escape"){
    modal.style.display = "none";
    document.body.classList.remove("modal-open");
  }
});

let touchStartX = 0;
let touchEndX = 0;

modalImg.addEventListener("touchstart", e=>{
  touchStartX = e.touches[0].clientX;
});

modalImg.addEventListener("touchend", e=>{
  touchEndX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe(){
  const threshold = 60; // boleh adjust

  if(touchEndX - touchStartX > threshold){
    // swipe right
    showModalImage(
      (currentIndex - 1 + modalImageIds.length) % modalImageIds.length
    );
  }

  if(touchStartX - touchEndX > threshold){
    // swipe left
    showModalImage((currentIndex + 1) % modalImageIds.length);
  }
}

// ------- multi download -------
async function downloadMultiple(){

  multiDownload.disabled = true;
  multiDownload.textContent = "Downloading...";

  for(const fileId of selectedIds){

    const fileData = loadedImages.find(img => img.id === fileId);
    const fileName = fileData?.name || "photo.jpg";

    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;

    try{
      const response = await fetch(url);
      const blob = await response.blob();
      const blobUrl = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = blobUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      window.URL.revokeObjectURL(blobUrl);

      await new Promise(r => setTimeout(r, 400));

    }catch(err){
      console.error("Failed:", fileId);
    }
  }

  multiDownload.textContent = "Done ✓";

  setTimeout(()=>{
    multiDownload.textContent = "Download";
    multiDownload.disabled = false;
    exitMultiMode();
  },1500);
}

multiDownload.onclick = downloadMultiple;

selectBtn.onclick = ()=>{

  selectMode = true;
  selectedIds.clear();

  selectBtn.style.display = "none";
  multiBar.style.display = "flex";
  multiCount.textContent = "0 ";
};

function exitMultiMode(){
  selectMode = false;
  selectedIds.clear();

  multiBar.style.display = "none";
  selectBtn.style.display = "inline-block";

  document.querySelectorAll(".selected")
    .forEach(el=>el.classList.remove("selected"));
}

multiCancel.onclick = exitMultiMode;

// ------------------- Init -------------------
moreBtn.onclick = loadNextImages;
loadNextImages();
</script>


</body>
</html>
