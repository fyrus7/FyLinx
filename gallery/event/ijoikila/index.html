<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyLinx Gallery</title>

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#fff;
  color:#111;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:5;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  border-bottom:1px solid #eee;
  background:#fff;
}

header h1{font-size:14px;margin:0}
header span{font-size:12px;color:#777}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  padding:6px;
}

@media(min-width:600px){
  .gallery{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1024px){
  .gallery{grid-template-columns:repeat(6,1fr)}
}

.gallery img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:4px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  flex-direction:column;
  z-index:20;
}

.modal-top,
.modal-bottom{
  width:100%;
  text-align:center;
  color:#fff;
  padding:14px 0;
  font-size:14px;
  background:rgba(0,0,0,.6);
  cursor:pointer;
  user-select:none;
}

.modal img{
  max-width:95vw;
  max-height:80vh;
  object-fit:contain;
  margin:auto;
}

.modal-close{
  position:absolute;
  top:14px;
  right:16px;
  font-size:26px;
  color:#fff;
  cursor:pointer;
}

body.modal-open{
  overflow:hidden;
  position:fixed;
  width:100%;
}

  header button{
  padding:6px 10px;
  border:1px solid #ddd;
  background:#fff;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

.img-wrapper{
  position:relative;
}

.img-checkbox{
  position:absolute;
  top:6px;
  left:6px;
  width:18px;
  height:18px;
  display:none;
}
</style>
</head>

<body>

<header>
  <h1>FyLinx</h1>
  <span>Ijoy & Kila</span>
    <div id="headerActions">
    <button id="selectBtn">Select</button>
  </div>
</header>

<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">

  <!-- TOP BLACK BAR -->
  <div class="modal-top" id="modalTop">
    Click anywhere here to close
  </div>

  <img id="modalImg">

  <!-- BOTTOM BLACK BAR -->
  <div class="modal-bottom" id="modalDownload">
    Download
  </div>

</div>

<script>
const API_KEY = "AIzaSyCyL4jxLN9w87WG20GqeEIAaUCupjKmn8U";
const FOLDER_ID = "1qEfxwXgPcvEPRlBKNNecsHaqFSRrAjTE";
const PAGE_SIZE = 24;

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

let nextPageToken = null;
let loading = false;
let finished = false;
let scrollY = 0;

let selectMode = false;
let selectedIds = new Set();

const selectBtn = document.getElementById("selectBtn");
const headerActions = document.getElementById("headerActions");

/* LOAD IMAGES */
async function loadNextImages(){
  if(loading || finished) return;
  loading = true;

  const query = encodeURIComponent(
    `'${FOLDER_ID}' in parents and mimeType contains 'image/'`
  );

  let url =
    `https://www.googleapis.com/drive/v3/files?q=${query}` +
    `&orderBy=name desc&pageSize=${PAGE_SIZE}` +
    `&fields=nextPageToken,files(id)` +
    `&key=${API_KEY}`;

  if(nextPageToken) url += `&pageToken=${nextPageToken}`;

  const res = await fetch(url);
  const data = await res.json();

  nextPageToken = data.nextPageToken || null;
  if(!nextPageToken) finished = true;

data.files.forEach(file=>{

  const wrapper = document.createElement("div");
  wrapper.className = "img-wrapper";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.className = "img-checkbox";

  checkbox.onchange = ()=>{
    if(checkbox.checked){
      selectedIds.add(file.id);
    }else{
      selectedIds.delete(file.id);
    }
  };

  const img = document.createElement("img");
  img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w500`;

  img.onclick = ()=>{
    if(selectMode){
      checkbox.checked = !checkbox.checked;
      checkbox.dispatchEvent(new Event("change"));
    }else{
      openModal(file.id);
    }
  };

  wrapper.appendChild(img);
  wrapper.appendChild(checkbox);
  gallery.appendChild(wrapper);
});

  loading = false;
  requestAnimationFrame(ensureScrollable);
}

  function ensureScrollable(){
  if(
    document.body.scrollHeight <= window.innerHeight &&
    !loading &&
    !finished
  ){
    loadNextImages();
  }
}

  selectBtn.onclick = ()=>{

  if(!selectMode){
    enterSelectMode();
  }else{
    downloadSelected();
  }

};

function enterSelectMode(){
  selectMode = true;
  selectedIds.clear();

  document.querySelectorAll(".img-checkbox")
    .forEach(cb=>cb.style.display="block");

  headerActions.innerHTML = `
    <button id="downloadBtn">Download</button>
    <button id="cancelBtn">Cancel</button>
  `;

  document.getElementById("downloadBtn").onclick = downloadSelected;
  document.getElementById("cancelBtn").onclick = exitSelectMode;
}

function exitSelectMode(){
  selectMode = false;
  selectedIds.clear();

  document.querySelectorAll(".img-checkbox")
    .forEach(cb=>{
      cb.checked = false;
      cb.style.display="none";
    });

  headerActions.innerHTML =
    `<button id="selectBtn">Select</button>`;

  document.getElementById("selectBtn").onclick = ()=>{
    enterSelectMode();
  };
}

function downloadSelected(){
  if(selectedIds.size === 0) return;

  selectedIds.forEach(id=>{
    window.open(
      `https://drive.google.com/uc?export=download&id=${id}`,
      "_blank"
    );
  });

  exitSelectMode();
}
  
/* SCROLL INFINITE LOAD */
window.addEventListener("scroll",()=>{
  const scrollBottom =
    window.innerHeight + window.scrollY >=
    document.body.offsetHeight - 800;

  if(scrollBottom){
    loadNextImages();
  }
});

const modalTop = document.getElementById("modalTop");
const modalDownload = document.getElementById("modalDownload");
let currentImageId = null;

  modalTop.onclick = closeModal;

modalDownload.onclick = ()=>{
  if(!currentImageId) return;
  window.open(
    `https://drive.google.com/uc?export=download&id=${currentImageId}`,
    "_blank"
  );
};
  
/* MODAL */
function openModal(id){
  currentImageId = id;

  scrollY = window.scrollY;
  document.body.classList.add("modal-open");
  document.body.style.top = `-${scrollY}px`;

  modalImg.src = `https://lh3.googleusercontent.com/d/${id}`;
  modal.style.display = "flex";
}

function closeModal(){
  modal.style.display = "none";
  modalImg.src = "";

  document.body.classList.remove("modal-open");
  document.body.style.top = "";
  window.scrollTo(0, scrollY);
}

modal.addEventListener("click",e=>{
  if(e.target === modal) closeModal();
});

/* INIT */
loadNextImages();
requestAnimationFrame(ensureScrollable);
</script>

</body>
</html>
